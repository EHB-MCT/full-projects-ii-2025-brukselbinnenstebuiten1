<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Styleguide</title>
		<link href="./css/reset.css" rel="stylesheet" type="text/css" />
		<link href="./css/style.css" rel="stylesheet" type="text/css" />
		<link rel="stylesheet" href="https://use.typekit.net/wxj0hxv.css" />
	</head>
	<body>
		<section>
			<h1>FONT NEXA</h1>
			<h1>Heading 1</h1>
			<h2>Heading 2</h2>
			<h3>Heading 3</h3>
			<p>
				Paragraph text. 16pt <strong>Bold</strong>, <em>Italic</em>,
				<a href="#">Link</a>
			</p>
			<blockquote>Blockquote text</blockquote>
		</section>

		<section>
			<h1>Colors</h1>
			<button class="one">#08b14c</button>
			<button class="two">#078c3c</button>
			<button class="three">#05632b</button>
			<button class="four">#033b19</button>
			<button class="five">#0bde5f</button>
		</section>

		<section>
			<h1>Buttons</h1>
			<button class="primary active">Primary Active</button>
			<button class="primary hover">Primary Hover</button>
			<button class="primary inactive">Primary Inactive</button>
			<button class="secondary active">Secondary Active</button>
			<button class="secondary hover">Secondary Hover</button>
			<button class="secondary inactive">Secondary Inactive</button>
		</section>

		<section>
			<h1>Forms</h1>
			<form>
				<label for="text">Text Input</label>
				<input type="text" id="text" name="text" /><br />

				<label for="email">Email</label>
				<input type="email" id="email" name="email" /><br />

				<label for="select">Select</label>
				<select id="select" name="select">
					<option>Option 1</option>
					<option>Option 2</option></select
				><br />

				<label><input type="checkbox" /> Checkbox</label><br />
				<label><input type="radio" name="radio" /> Radio</label><br />

				<label for="textarea">Textarea</label><br />
				<textarea id="textarea"></textarea><br />

				<button type="submit">Submit</button>
			</form>
		</section>

		<section>
			<h1>Lists</h1>
			<ul>
				<li>Unordered item</li>
				<li>Unordered item</li>
			</ul>
			<ol>
				<li>Ordered item</li>
				<li>Ordered item</li>
			</ol>
		</section>

		<section>
			<h1>Grid</h1>
			<div
				style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px"
			>
				<div>Grid Item 1</div>
				<div>Grid Item 2</div>
				<div>Grid Item 3</div>
			</div>
		</section>
	</body>
</html>
